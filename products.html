<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PENDYALA DIVINE SERVICES</title>

<style>
html{ scroll-behavior:smooth; }

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#fff5e6;
    text-align:center;
}

/* HEADER */
header{
    background:#ff6600;
    color:white;
    padding:12px;
}

.header-content{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
}

.logo{
    width:110px;
    height:110px;
    border-radius:50%;
    background:white;
    padding:6px;
}

.title-main{
    font-size:36px;
    font-weight:bold;
    margin:0;
}

.title-sub{
    font-size:18px;
    margin-top:5px;
}

/* MENU */
.menu{
    background:white;
    padding:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
}

.menu a{
    text-decoration:none;
    color:#ff6600;
    font-weight:bold;
    font-size:15px;
    padding:6px 10px;
    border-radius:6px;
}

@media (max-width:600px){
    .menu{
        justify-content:space-around;
    }
    .menu a{
        font-size:13px;
        padding:6px 8px;
    }
}

/* CONTAINER */
.container{
    padding:20px;
}

/* GRID */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(220px,280px));
    justify-content:center;
    gap:20px;
}

/* CARD */
.card{
    background:white;
    border-radius:12px;
    padding:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.12);
}

/* IMAGE */
.main-image{
    width:100%;
    aspect-ratio:1/1;
    overflow:hidden;
    border-radius:8px;
}

.main-image img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* TEXT */
.price{
    color:#cc0000;
    font-size:18px;
    font-weight:bold;
}

.btn{
    background:#ff6600;
    color:white;
    padding:7px;
    border-radius:6px;
    text-decoration:none;
    display:block;
    margin-top:8px;
}

.whatsapp{
    background:#25D366;
}

.qty-box{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:10px;
}

/* CHECKOUT POPUP */
#checkoutBox{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
}

.popup{
    background:white;
    padding:20px;
    border-radius:10px;
    width:90%;
    max-width:400px;
    text-align:left;
}
</style>
</head>

<body>

<header>
<div class="header-content">
<img src="icon.jpeg" class="logo">
<div>
<p class="title-main">PENDYALA</p>
<p class="title-sub">DIVINE SERVICES</p>
</div>
</div>
</header>

<div class="menu">
<a href="#">Poojas</a>
<a href="#">Astrology</a>
<a href="#">Muhurthas</a>
<a href="#">Spiritual Products</a>
</div>

<div class="container">

<h2>Spiritual Products</h2>

<div class="products">

<!-- PRODUCT -->
<div class="card">
<div class="main-image">
<img src="Images/Chandra Mouli Lingam.jpeg">
</div>

<h3>Spatika Shivlingam</h3>
<div class="price">₹3999</div>

<div class="qty-box">
<button onclick="changeQty(this,-1)">-</button>
<span class="qty">1</span>
<button onclick="changeQty(this,1)">+</button>
</div>

<a href="#" class="btn" onclick="openCheckout(this)">Buy Now</a>
<a href="#" class="btn whatsapp" onclick="orderWhatsApp(this,event)">WhatsApp</a>
</div>

</div>
</div>

<!-- POPUP -->
<div id="checkoutBox">
<div class="popup">

<h3>Enter Details</h3>

<input id="c_name" placeholder="Name" style="width:100%;padding:8px;margin:5px 0;">
<input id="c_phone" placeholder="Phone" style="width:100%;padding:8px;margin:5px 0;">
<textarea id="c_address" placeholder="Address" style="width:100%;padding:8px;margin:5px 0;"></textarea>

<button onclick="submitOrder()" style="width:100%;padding:10px;background:#ff6600;color:white;border:none;">
Proceed to Payment
</button>

<button onclick="closeCheckout()">Cancel</button>

</div>
</div>

<script>
let selectedProduct="", selectedPrice="", selectedQty="";

// OPEN FORM
function openCheckout(btn){
    let card = btn.closest(".card");
    selectedProduct = card.querySelector("h3").innerText;
    selectedPrice = card.querySelector(".price").innerText;
    selectedQty = card.querySelector(".qty").innerText;

    document.getElementById("checkoutBox").style.display="flex";
}

// CLOSE
function closeCheckout(){
    document.getElementById("checkoutBox").style.display="none";
}

// QTY
function changeQty(btn, change){
    let qtyEl = btn.parentElement.querySelector(".qty");
    let qty = parseInt(qtyEl.innerText);
    qty = Math.max(1, qty + change);
    qtyEl.innerText = qty;
}

// WHATSAPP DIRECT
function orderWhatsApp(btn,e){
    e.preventDefault();
    let card = btn.closest(".card");

    let name = card.querySelector("h3").innerText;
    let price = card.querySelector(".price").innerText;
    let qty = card.querySelector(".qty").innerText;

    let msg = `Order:\n${name}\n${price}\nQty:${qty}`;
    window.open(`https://wa.me/919347184217?text=${encodeURIComponent(msg)}`);
}

// SUBMIT FORM
function submitOrder(){
    let name = document.getElementById("c_name").value;
    let phone = document.getElementById("c_phone").value;
    let address = document.getElementById("c_address").value;

    if(!name || !phone || !address){
        alert("Fill all details");
        return;
    }

    let msg = `New Order:

Product: ${selectedProduct}
Price: ${selectedPrice}
Qty: ${selectedQty}

Name: ${name}
Phone: ${phone}
Address: ${address}`;

    window.open(`https://wa.me/919347184217?text=${encodeURIComponent(msg)}`);

    setTimeout(()=>{
        window.location.href="payment.html"; // change later to Razorpay
    },1500);
}
</script>

</body>
</html>
