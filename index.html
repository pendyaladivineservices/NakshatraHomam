<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PENDYALA DIVINE SERVICES</title>

<style>
html{ scroll-behavior:smooth; }

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#fff5e6;
    text-align:center;
}

/* LANGUAGE SELECT */
.lang-select{
    background:#222;
    color:white;
    padding:8px;
    text-align:right;
}
.lang-select select{
    padding:5px;
}

/* HEADER */
header{
    background:#ff6600;
    color:white;
    padding:12px;
}

.header-content{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
}

.logo{
    width:110px;
    height:110px;
    border-radius:50%;
    background:white;
    padding:6px;
}

.title-main{ font-size:36px; font-weight:bold; margin:0; }
.title-sub{ font-size:18px; margin-top:5px; }

/* MENU */
.menu{
    background:white;
    padding:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}
.menu a{
    text-decoration:none;
    color:#ff6600;
    font-weight:bold;
    margin:0 12px;
    font-size:16px;
}

/* BANNER */
.header-img{ width:100%; }

/* CONTAINER */
.container{ padding:15px; }

/* SECTION */
.section-card{
    background:white;
    margin:20px auto;
    padding:15px;
    border-radius:12px;
    max-width:1100px;
    box-shadow:0 0 10px rgba(0,0,0,0.12);
}
.section-title{
    color:#8B0000;
    margin-bottom:10px;
    font-size:22px;
}

/* SLIDER */
.slider-wrapper{ position:relative; }
.slider{
    display:flex;
    overflow-x:auto;
    gap:15px;
    padding:10px;
    scroll-snap-type:x mandatory;
}
.slider::-webkit-scrollbar{ display:none; }

/* ARROWS */
.arrow{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:#ff6600;
    color:white;
    border:none;
    width:35px;
    height:35px;
    border-radius:50%;
    cursor:pointer;
}
.arrow.left{ left:-10px; }
.arrow.right{ right:-10px; }

/* CARD */
.service-card{
    min-width:260px;
    max-width:260px;
    background:white;
    border-radius:12px;
    padding:12px;
    box-shadow:0 0 8px rgba(0,0,0,0.10);
    display:flex;
    flex-direction:column;
}

.card-content{ flex:1; }

.desc{ font-size:13px; line-height:1.5; color:#333; }

.price{
    color:#cc0000;
    font-size:22px;
    font-weight:bold;
}

.service-card img{
    width:100%;
    max-width:170px;
    margin:8px auto;
}

/* FOOTER */
.card-footer{
    margin-top:auto;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.btn{
    background:#ff6600;
    color:white;
    padding:8px;
    border-radius:6px;
    text-decoration:none;
}

/* MOBILE */
@media (max-width:600px){
    .service-card{ min-width:220px; }
}
</style>
</head>

<body>

<!-- LANGUAGE -->
<div class="lang-select">
<select onchange="changeLang(this.value)">
<option value="en">English</option>
<option value="te">తెలుగు</option>
</select>
</div>

<header>
<div class="header-content">
<img src="icon.jpeg" class="logo">
<div>
<p class="title-main">PENDYALA</p>
<p class="title-sub" id="titleSub">DIVINE SERVICES</p>
</div>
</div>
</header>

<div class="menu">
<a href="#poojas" id="menu1">Poojas</a>
<a href="#astrology" id="menu2">Astrology</a>
<a href="#muhurthas" id="menu3">Muhurthas</a>
</div>

<img src="banner.png" class="header-img">

<div class="container">

<!-- SECTION -->
<h2 id="poojaTitle">Pooja Services</h2>
<p id="poojaDesc">🙏 Sankalpam with your Gothram, Name & Nakshatram followed by Nakshatra Aavahana.</p>

</div>

<script>
const translations = {
en:{
titleSub:"DIVINE SERVICES",
menu1:"Poojas",
menu2:"Astrology",
menu3:"Muhurthas",
poojaTitle:"Pooja Services",
poojaDesc:"🙏 Sankalpam with your Gothram, Name & Nakshatram followed by Nakshatra Aavahana."
},
te:{
titleSub:"దివ్య సేవలు",
menu1:"పూజలు",
menu2:"జ్యోతిష్యం",
menu3:"ముహూర్తాలు",
poojaTitle:"పూజ సేవలు",
poojaDesc:"🙏 మీ గోత్రం, పేరు, నక్షత్రంతో సంకల్పం చేసి నక్షత్ర ఆవాహన నిర్వహిస్తాము."
}
};

function changeLang(lang){
document.getElementById("titleSub").innerText = translations[lang].titleSub;
document.getElementById("menu1").innerText = translations[lang].menu1;
document.getElementById("menu2").innerText = translations[lang].menu2;
document.getElementById("menu3").innerText = translations[lang].menu3;
document.getElementById("poojaTitle").innerText = translations[lang].poojaTitle;
document.getElementById("poojaDesc").innerText = translations[lang].poojaDesc;
}
</script>

</body>
</html>
