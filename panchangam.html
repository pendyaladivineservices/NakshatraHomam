<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Today's Telugu Panchangam</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#fff5e6;
    text-align:center;
}

/* HEADER */

header{
    background:#ff6600;
    color:white;
    padding:12px;
}

.header-content{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
}

.logo{
    width:100px;
    height:100px;
    border-radius:50%;
    background:white;
    padding:6px;
}

.title-main{
    font-size:32px;
    font-weight:bold;
    margin:0;
}

.title-sub{
    font-size:16px;
    margin-top:5px;
}

/* PAGE */

.container{
    padding:15px;
}

.page-title{
    color:#8B0000;
    font-size:30px;
    margin-top:20px;
}

.today-date{
    font-size:18px;
    margin-top:10px;
    color:#444;
}

/* CARD */

.card{
    background:white;
    margin:20px auto;
    padding:20px;
    border-radius:12px;
    max-width:1000px;
    box-shadow:0 0 10px rgba(0,0,0,0.12);
}

/* GRID */

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

.item{
    background:#fff4e8;
    padding:15px;
    border-radius:10px;
}

.label{
    font-weight:bold;
    color:#8B0000;
    display:block;
    margin-bottom:6px;
}

.value{
    font-size:18px;
    word-break:break-word;
}

/* LOADING */

.loading{
    font-size:20px;
    margin-top:40px;
}

.error{
    color:red;
    margin-top:20px;
}

</style>

</head>

<body>

<header>

<div class="header-content">

<img src="icon.jpeg" class="logo">

<div>
<p class="title-main">PENDYALA</p>
<p class="title-sub">DIVINE SERVICES</p>
</div>

</div>

</header>

<div class="container">

<h1 class="page-title">
🕉 Today's Telugu Panchangam
</h1>

<div class="today-date" id="todayDate"></div>

<div id="loading" class="loading">
Loading Panchangam...
</div>

<div id="error" class="error"></div>

<div id="content" style="display:none;">

<!-- CALENDAR -->

<div class="card">

<h2>Calendar</h2>

<div class="grid">

<div class="item">
<span class="label">Vaaram</span>
<span class="value" id="vaaram">-</span>
</div>

</div>

</div>

<!-- TIMINGS -->

<div class="card">

<h2>Sun & Moon Timings</h2>

<div class="grid">

<div class="item">
<span class="label">Sunrise</span>
<span class="value" id="sunrise">-</span>
</div>

<div class="item">
<span class="label">Sunset</span>
<span class="value" id="sunset">-</span>
</div>

<div class="item">
<span class="label">Moonrise</span>
<span class="value" id="moonrise">-</span>
</div>

<div class="item">
<span class="label">Moonset</span>
<span class="value" id="moonset">-</span>
</div>

</div>

</div>

<!-- PANCHANGAM -->

<div class="card">

<h2>Important Timings</h2>

<div class="grid">

<div class="item">
<span class="label">Rahukalam</span>
<span class="value" id="rahukalam">-</span>
</div>

<div class="item">
<span class="label">Yamagandam</span>
<span class="value" id="yamagandam">-</span>
</div>

<div class="item">
<span class="label">Gulika</span>
<span class="value" id="gulika">-</span>
</div>

<div class="item">
<span class="label">Varjyam</span>
<span class="value" id="varjyam">-</span>
</div>

<div class="item">
<span class="label">Amrita Kalam</span>
<span class="value" id="amrita">-</span>
</div>

<div class="item">
<span class="label">Durmuhurtham</span>
<span class="value" id="durmuhurtham">-</span>
</div>

</div>

</div>

</div>

</div>

<script>

// =====================
// APPS SCRIPT URL
// =====================

const API_URL =
"https://script.google.com/macros/s/AKfycbzwBsayIN21y1onJCcKSVdDd1F0PNNv08-WK12QUcsOQcgh2uQQb6nhGqGNt9jlbpv8/exec";

// =====================
// DATE
// =====================

const now = new Date();

document.getElementById("todayDate")
.innerText =
now.toDateString();

// =====================
// SAFE VALUE SETTER
// =====================

function setValue(id, value){

    const el =
    document.getElementById(id);

    if(el){

        if(typeof value === "object"){

            el.innerText =
            JSON.stringify(value);

        }else{

            el.innerText =
            value || "-";
        }
    }
}

// =====================
// LOAD DATA
// =====================

async function loadPanchangam(){

    try{

        const response =
        await fetch(API_URL);

        const text =
        await response.text();

        console.log(text);

        const p =
        JSON.parse(text);

        // SET VALUES

        setValue("vaaram", p.vaaram);

        setValue("sunrise", p.sunrise);
        setValue("sunset", p.sunset);

        setValue("moonrise", p.moonrise);
        setValue("moonset", p.moonset);

        setValue("rahukalam", p.rahukalam);

        setValue("yamagandam", p.yamagandam);

        setValue("gulika", p.gulika);

        setValue("varjyam", p.varjyam);

        setValue("amrita", p.amrita);

        setValue("durmuhurtham", p.durmuhurtham);

        // HIDE LOADING

        document.getElementById("loading")
        .style.display = "none";

        // SHOW CONTENT

        document.getElementById("content")
        .style.display = "block";

    }catch(err){

        console.log(err);

        document.getElementById("loading")
        .style.display = "none";

        document.getElementById("error")
        .innerText =
        "Failed to load Panchangam";
    }
}

// =====================
// START
// =====================

loadPanchangam();

</script>

</body>
</html>
